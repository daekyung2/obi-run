<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBI RUN - 오비 런</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
}
canvas { display: block; border-radius: 8px; }
#ui-overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  display: flex;
  justify-content: center;
  align-items: center;
}
.screen {
  pointer-events: auto;
  text-align: center;
  color: white;
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 15px;
  max-height: 90vh;
  overflow-y: auto;
}
#menu { display: flex; gap: 20px; }
h1 {
  font-size: 64px;
  background: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: none;
  filter: drop-shadow(0 0 20px rgba(255,107,107,0.5));
}
.subtitle { font-size: 18px; color: #aaa; }
.btn {
  padding: 15px 40px;
  font-size: 20px;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  font-weight: bold;
  transition: transform 0.2s, box-shadow 0.2s;
  color: white;
}
.btn:hover { transform: scale(1.05); }
.btn-start {
  background: linear-gradient(135deg, #ff6b6b, #ee5a24);
  box-shadow: 0 5px 20px rgba(238,90,36,0.5);
}
.btn-retry {
  background: linear-gradient(135deg, #48dbfb, #0abde3);
  box-shadow: 0 5px 20px rgba(10,189,227,0.5);
}
.btn-lb {
  background: linear-gradient(135deg, #feca57, #f39c12);
  box-shadow: 0 5px 20px rgba(243,156,18,0.5);
  padding: 12px 30px;
  font-size: 16px;
}
.btn-back {
  background: linear-gradient(135deg, #636e72, #2d3436);
  box-shadow: 0 5px 20px rgba(45,52,54,0.5);
  padding: 10px 25px;
  font-size: 14px;
}
.btn-submit {
  background: linear-gradient(135deg, #00b894, #00cec9);
  box-shadow: 0 5px 20px rgba(0,206,201,0.5);
  padding: 12px 30px;
  font-size: 16px;
}
.controls-info {
  color: #666;
  font-size: 14px;
  line-height: 1.8;
}
.stat { font-size: 28px; margin: 5px 0; }
.stat-label { color: #aaa; font-size: 14px; }

/* Leaderboard */
.leaderboard {
  background: rgba(0,0,0,0.4);
  border-radius: 15px;
  padding: 20px;
  min-width: 350px;
  max-width: 400px;
}
.leaderboard h2 {
  font-size: 22px;
  margin-bottom: 15px;
  color: #feca57;
}
.lb-table {
  width: 100%;
  border-collapse: collapse;
}
.lb-table th {
  color: #aaa;
  font-size: 12px;
  text-transform: uppercase;
  padding: 5px 8px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  text-align: left;
}
.lb-table td {
  padding: 8px;
  font-size: 14px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.lb-rank { width: 40px; text-align: center !important; }
.lb-rank-1 { color: #feca57; font-weight: bold; }
.lb-rank-2 { color: #b2bec3; font-weight: bold; }
.lb-rank-3 { color: #e17055; font-weight: bold; }
.lb-name { text-align: left; }
.lb-time { color: #48dbfb; font-family: 'Courier New', monospace; font-weight: bold; }
.lb-deaths { color: #ff6b6b; text-align: center; }
.lb-empty { color: #636e72; font-style: italic; padding: 20px; }
.lb-new { background: rgba(254,202,87,0.1); }

/* Name input */
.name-input-wrap {
  display: flex;
  gap: 10px;
  align-items: center;
  justify-content: center;
}
.name-input {
  padding: 12px 20px;
  font-size: 18px;
  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 25px;
  background: rgba(255,255,255,0.1);
  color: white;
  outline: none;
  width: 200px;
  text-align: center;
  font-family: 'Segoe UI', sans-serif;
}
.name-input:focus {
  border-color: #feca57;
  box-shadow: 0 0 15px rgba(254,202,87,0.3);
}
.name-input::placeholder { color: rgba(255,255,255,0.3); }
.btn-row { display: flex; gap: 10px; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="ui-overlay">
  <!-- Main Menu -->
  <div id="menu" class="screen">
    <h1>OBI RUN</h1>
    <p class="subtitle">장애물을 피해 골인 지점까지 달려라!</p>
    <button class="btn btn-start" onclick="startGame()">게임 시작</button>
    <button class="btn btn-lb" onclick="showLeaderboard()">리더보드</button>
    <div class="controls-info">
      방향키 / WASD: 이동<br>
      스페이스바 / W / ↑: 점프 (2단 점프 가능)<br>
      R: 재시작
    </div>
  </div>

  <!-- Clear Screen -->
  <div id="clear-screen" class="screen">
    <h1 style="font-size:48px">클리어!</h1>
    <div class="stat" id="final-time"></div>
    <div class="stat-label">클리어 타임</div>
    <div class="stat" id="final-deaths"></div>
    <div class="stat-label">사망 횟수</div>
    <div style="margin-top:10px">
      <p style="color:#aaa;font-size:14px;margin-bottom:8px;">닉네임을 입력하세요</p>
      <div class="name-input-wrap">
        <input type="text" id="player-name" class="name-input" placeholder="닉네임" maxlength="12" autocomplete="off">
        <button class="btn btn-submit" onclick="submitScore()">등록</button>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-retry" onclick="startGame()">다시 도전</button>
      <button class="btn btn-lb" onclick="showLeaderboard()">리더보드</button>
    </div>
  </div>

  <!-- Leaderboard Screen -->
  <div id="lb-screen" class="screen">
    <h1 style="font-size:42px">리더보드</h1>
    <div class="leaderboard">
      <table class="lb-table">
        <thead>
          <tr>
            <th class="lb-rank">#</th>
            <th class="lb-name">이름</th>
            <th>타임</th>
            <th>사망</th>
            <th>날짜</th>
          </tr>
        </thead>
        <tbody id="lb-body"></tbody>
      </table>
    </div>
    <div class="btn-row">
      <button class="btn btn-back" onclick="showMenu()">돌아가기</button>
      <button class="btn btn-start" onclick="startGame()">게임 시작</button>
    </div>
  </div>
</div>

<script>
// ===== CANVAS SETUP =====
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 960, H = 540;
canvas.width = W;
canvas.height = H;

// ===== LEADERBOARD =====
const LB_KEY = 'obi-leaderboard';
let lastSubmittedId = null;

function getLeaderboard() {
  try {
    return JSON.parse(localStorage.getItem(LB_KEY)) || [];
  } catch { return []; }
}

function saveLeaderboard(lb) {
  localStorage.setItem(LB_KEY, JSON.stringify(lb));
}

function addScore(name, time, deaths) {
  const lb = getLeaderboard();
  const entry = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
    name: name.trim() || '익명',
    time,
    deaths,
    date: new Date().toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' }),
  };
  lb.push(entry);
  lb.sort((a, b) => a.time - b.time || a.deaths - b.deaths);
  const trimmed = lb.slice(0, 20);
  saveLeaderboard(trimmed);
  lastSubmittedId = entry.id;
  return entry;
}

function renderLeaderboard() {
  const lb = getLeaderboard();
  const tbody = document.getElementById('lb-body');
  if (lb.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" class="lb-empty">아직 기록이 없습니다. 첫 번째 기록을 세워보세요!</td></tr>';
    return;
  }
  tbody.innerHTML = lb.slice(0, 10).map((entry, i) => {
    const rankClass = i === 0 ? 'lb-rank-1' : i === 1 ? 'lb-rank-2' : i === 2 ? 'lb-rank-3' : '';
    const rankIcon = i === 0 ? '👑' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i + 1);
    const isNew = entry.id === lastSubmittedId ? 'lb-new' : '';
    return `<tr class="${isNew}">
      <td class="lb-rank ${rankClass}">${rankIcon}</td>
      <td class="lb-name">${escapeHtml(entry.name)}</td>
      <td class="lb-time">${formatTime(entry.time)}</td>
      <td class="lb-deaths">${entry.deaths}회</td>
      <td style="color:#636e72;font-size:12px">${entry.date}</td>
    </tr>`;
  }).join('');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function submitScore() {
  const nameInput = document.getElementById('player-name');
  const name = nameInput.value.trim();
  if (!name) { nameInput.focus(); nameInput.style.borderColor = '#ff6b6b'; return; }
  nameInput.style.borderColor = '';
  addScore(name, timer, deaths);
  localStorage.setItem('obi-last-name', name);
  showLeaderboard();
}

function showLeaderboard() {
  hideAllScreens();
  renderLeaderboard();
  document.getElementById('lb-screen').style.display = 'flex';
  gameState = 'menu';
}

function showMenu() {
  hideAllScreens();
  document.getElementById('menu').style.display = 'flex';
  gameState = 'menu';
}

function hideAllScreens() {
  document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
}

// ===== GAME STATE =====
let gameState = 'menu'; // menu, playing, clear
let currentStage = 0;
let timer = 0;
let deaths = 0;
let particles = [];
let cameraX = 0;
let lastTime = 0;

// ===== STAGE THEMES =====
const themes = [
  { bg1: '#1a1a4e', bg2: '#2d2d7e', platform: '#4ecdc4', accent: '#ff6b6b', name: '튜토리얼' },
  { bg1: '#1a0a2e', bg2: '#3d1a6e', platform: '#a29bfe', accent: '#fd79a8', name: '움직이는 발판' },
  { bg1: '#0a2e1a', bg2: '#1a6e3d', platform: '#55efc4', accent: '#ffeaa7', name: '낙하 구간' },
  { bg1: '#2e0a0a', bg2: '#6e1a1a', platform: '#fab1a0', accent: '#ff7675', name: '스파이크 지옥' },
  { bg1: '#0a1a2e', bg2: '#1a3d6e', platform: '#74b9ff', accent: '#fdcb6e', name: '최종 스테이지' },
];

// ===== PLAYER =====
const player = {
  x: 50, y: 0, w: 30, h: 30,
  vx: 0, vy: 0,
  jumpCount: 0,
  maxJumps: 2,
  speed: 5,
  jumpForce: -12,
  gravity: 0.6,
  grounded: false,
  spawnX: 50, spawnY: 0,
  eyeBlink: 0,
  squash: 1,
};

// ===== INPUT =====
const keys = {};
window.addEventListener('keydown', e => {
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyW','KeyA','KeyS','KeyD','KeyR'].includes(e.code)) {
    e.preventDefault();
  }
  if (!keys[e.code]) {
    keys[e.code] = true;
    if (gameState === 'playing') {
      if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
        playerJump();
      }
      if (e.code === 'KeyR') {
        respawnPlayer();
      }
    }
  }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

function playerJump() {
  if (player.jumpCount < player.maxJumps) {
    player.vy = player.jumpForce;
    player.jumpCount++;
    player.squash = 0.6;
    spawnParticles(player.x + player.w/2, player.y + player.h, 5, themes[currentStage].accent);
  }
}

let stages = createStages();

// ===== PARTICLES =====
function spawnParticles(x, y, count, color) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 8,
      vy: (Math.random() - 1) * 6,
      size: Math.random() * 5 + 2,
      color,
      life: 1,
      decay: Math.random() * 0.03 + 0.02,
    });
  }
}

function spawnDeathParticles(x, y) {
  for (let i = 0; i < 25; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 12,
      vy: (Math.random() - 0.5) * 12,
      size: Math.random() * 8 + 3,
      color: `hsl(${Math.random()*60}, 100%, 60%)`,
      life: 1,
      decay: Math.random() * 0.02 + 0.01,
    });
  }
}

// ===== COLLISION =====
function rectCollide(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function spikeCollide(player, spike) {
  const cx = spike.x + spike.w/2;
  const cy = spike.y;
  const px = player.x + player.w/2;
  const py = player.y + player.h/2;
  const dist = Math.sqrt((cx-px)**2 + (cy-py)**2);
  return dist < 18;
}

// ===== GAME FUNCTIONS =====
function startGame() {
  gameState = 'playing';
  currentStage = 0;
  timer = 0;
  deaths = 0;
  stages = createStages();
  loadStage(0);
  hideAllScreens();
  lastTime = performance.now();
}

function loadStage(index) {
  currentStage = index;
  const stage = stages[currentStage];
  player.spawnX = stage.spawnX;
  player.spawnY = stage.spawnY;
  respawnPlayer();
}

function respawnPlayer() {
  const stage = stages[currentStage];
  player.x = stage.spawnX;
  player.y = stage.spawnY;
  player.vx = 0;
  player.vy = 0;
  player.jumpCount = 0;
  player.grounded = false;
  player.squash = 1;
  cameraX = Math.max(0, player.x - W/3);
  stage.fallingPlatforms.forEach(fp => {
    fp.timer = 0;
    fp.falling = false;
    fp.vy = 0;
    fp.y = fp.origY;
  });
}

function killPlayer() {
  deaths++;
  spawnDeathParticles(player.x + player.w/2, player.y + player.h/2);
  respawnPlayer();
}

function nextStage() {
  if (currentStage < stages.length - 1) {
    loadStage(currentStage + 1);
  } else {
    gameState = 'clear';
    showClearScreen();
  }
}

function showClearScreen() {
  const timeStr = formatTime(timer);
  document.getElementById('final-time').textContent = timeStr;
  document.getElementById('final-deaths').textContent = `${deaths}회`;
  hideAllScreens();
  document.getElementById('clear-screen').style.display = 'flex';
  // Pre-fill last used name
  const lastName = localStorage.getItem('obi-last-name') || '';
  const nameInput = document.getElementById('player-name');
  nameInput.value = lastName;
  setTimeout(() => nameInput.focus(), 100);
}

function formatTime(ms) {
  const totalSec = ms / 1000;
  const min = Math.floor(totalSec / 60);
  const sec = Math.floor(totalSec % 60);
  const msec = Math.floor((ms % 1000) / 10);
  return `${min.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}.${msec.toString().padStart(2,'0')}`;
}

// Enter key to submit name
document.getElementById('player-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitScore();
});

// ===== UPDATE =====
function update(dt) {
  if (gameState !== 'playing') return;

  timer += dt;
  const stage = stages[currentStage];

  // Input
  let moveX = 0;
  if (keys['ArrowLeft'] || keys['KeyA']) moveX = -1;
  if (keys['ArrowRight'] || keys['KeyD']) moveX = 1;
  player.vx = moveX * player.speed;

  // Gravity
  player.vy += player.gravity;
  if (player.vy > 15) player.vy = 15;

  // Move X
  player.x += player.vx;

  // Move Y
  player.y += player.vy;
  player.grounded = false;

  // Update moving platforms
  stage.movingPlatforms.forEach(mp => {
    const prevX = mp.x;
    const prevY = mp.y;
    mp.x = mp.startX + Math.sin(performance.now() * 0.001 * mp.speed) * mp.moveX;
    mp.y = mp.startY + Math.sin(performance.now() * 0.001 * mp.speed) * mp.moveY;
    mp.dx = mp.x - prevX;
    mp.dy = mp.y - prevY;
  });

  // Update falling platforms
  stage.fallingPlatforms.forEach(fp => {
    if (fp.falling) {
      if (fp.timer > 0) {
        fp.timer -= dt / 1000;
      } else {
        fp.vy += 0.5;
        fp.y += fp.vy;
      }
    }
  });

  // Platform collision helper
  function checkPlatform(plat) {
    if (rectCollide(player, plat)) {
      const overlapTop = (player.y + player.h) - plat.y;
      const overlapBottom = (plat.y + plat.h) - player.y;
      const overlapLeft = (player.x + player.w) - plat.x;
      const overlapRight = (plat.x + plat.w) - player.x;
      const minOverlap = Math.min(overlapTop, overlapBottom, overlapLeft, overlapRight);

      if (minOverlap === overlapTop && player.vy >= 0) {
        player.y = plat.y - player.h;
        player.vy = 0;
        player.grounded = true;
        player.jumpCount = 0;
        if (player.squash < 1) player.squash = Math.min(1, player.squash + 0.1);
        return true;
      } else if (minOverlap === overlapBottom && player.vy < 0) {
        player.y = plat.y + plat.h;
        player.vy = 0;
      } else if (minOverlap === overlapLeft) {
        player.x = plat.x - player.w;
      } else if (minOverlap === overlapRight) {
        player.x = plat.x + plat.w;
      }
    }
    return false;
  }

  // Static platforms
  stage.platforms.forEach(p => checkPlatform(p));

  // Moving platforms
  stage.movingPlatforms.forEach(mp => {
    if (checkPlatform(mp)) {
      player.x += mp.dx || 0;
      player.y += mp.dy || 0;
    }
  });

  // Falling platforms
  stage.fallingPlatforms.forEach(fp => {
    if (fp.y < H + 100) {
      if (checkPlatform(fp)) {
        if (!fp.falling) {
          fp.falling = true;
          fp.timer = fp.shakeTime;
        }
      }
    }
  });

  // Spike collision
  stage.spikes.forEach(spike => {
    if (spikeCollide(player, spike)) {
      killPlayer();
    }
  });

  // Fall off screen
  if (player.y > H + 50) {
    killPlayer();
  }

  // Goal check
  if (rectCollide(player, stage.goal)) {
    spawnParticles(stage.goal.x + 20, stage.goal.y + 25, 20, '#feca57');
    nextStage();
  }

  // Camera follow
  const targetCamX = player.x - W / 3;
  cameraX += (targetCamX - cameraX) * 0.08;
  if (cameraX < 0) cameraX = 0;

  // Squash recovery
  player.squash += (1 - player.squash) * 0.15;

  // Particles update
  particles = particles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.2;
    p.life -= p.decay;
    return p.life > 0;
  });

  // Eye blink timer
  player.eyeBlink += dt;
  if (player.eyeBlink > 3000) player.eyeBlink = 0;

  // Running particles
  if (player.grounded && Math.abs(player.vx) > 0 && Math.random() > 0.7) {
    spawnParticles(player.x + player.w/2, player.y + player.h, 1, '#ffffff44');
  }
}

// ===== DRAW =====
function draw() {
  const theme = themes[currentStage] || themes[0];

  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, theme.bg1);
  grad.addColorStop(1, theme.bg2);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Background decorations (stars)
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  for (let i = 0; i < 30; i++) {
    const sx = ((i * 137 + 50) % W + Math.sin(performance.now()*0.0003 + i) * 10);
    const sy = ((i * 97 + 30) % (H - 100));
    ctx.beginPath();
    ctx.arc(sx, sy, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }

  if (gameState === 'menu' || gameState === 'clear') return;

  const stage = stages[currentStage];
  ctx.save();
  ctx.translate(-cameraX, 0);

  // Draw platforms
  stage.platforms.forEach(p => drawPlatform(p, theme.platform));
  stage.movingPlatforms.forEach(p => drawPlatform(p, theme.accent, true));
  stage.fallingPlatforms.forEach(fp => {
    if (fp.y < H + 100) {
      let shakeX = 0;
      if (fp.falling && fp.timer > 0) {
        shakeX = (Math.random() - 0.5) * 6;
      }
      ctx.save();
      ctx.translate(shakeX, 0);
      drawPlatform(fp, '#ffeaa7', false, fp.falling ? 0.6 : 1);
      ctx.restore();
    }
  });

  // Draw spikes
  stage.spikes.forEach(spike => drawSpike(spike, theme.accent));

  // Draw goal
  drawGoal(stage.goal);

  // Draw player
  drawPlayer();

  // Draw particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  ctx.restore();

  // HUD
  drawHUD();
}

function drawPlatform(p, color, isMoving = false, alpha = 1) {
  ctx.globalAlpha = alpha;
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(p.x, p.y + 4, p.w, p.h);
  ctx.fillStyle = color;
  ctx.fillRect(p.x, p.y, p.w, p.h);
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.fillRect(p.x, p.y, p.w, 4);
  if (isMoving) {
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    for (let i = 0; i < p.w; i += 20) {
      ctx.fillRect(p.x + i, p.y + p.h/2 - 1, 10, 2);
    }
  }
  ctx.globalAlpha = 1;
}

function drawSpike(spike, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(spike.x + spike.w/2, spike.y);
  ctx.lineTo(spike.x + spike.w, spike.y + spike.h);
  ctx.lineTo(spike.x, spike.y + spike.h);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = 'rgba(255,100,100,0.3)';
  ctx.beginPath();
  ctx.moveTo(spike.x + spike.w/2, spike.y - 3);
  ctx.lineTo(spike.x + spike.w + 3, spike.y + spike.h + 3);
  ctx.lineTo(spike.x - 3, spike.y + spike.h + 3);
  ctx.closePath();
  ctx.fill();
}

function drawGoal(goal) {
  const pulse = Math.sin(performance.now() * 0.005) * 0.3 + 0.7;
  ctx.fillStyle = `rgba(254, 202, 87, ${pulse * 0.3})`;
  ctx.beginPath();
  ctx.arc(goal.x + goal.w/2, goal.y + goal.h/2, 40, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#aaa';
  ctx.fillRect(goal.x + goal.w/2 - 2, goal.y - 20, 4, goal.h + 20);
  ctx.fillStyle = `rgba(254, 202, 87, ${pulse})`;
  ctx.beginPath();
  ctx.moveTo(goal.x + goal.w/2 + 2, goal.y - 20);
  ctx.lineTo(goal.x + goal.w/2 + 30, goal.y - 10);
  ctx.lineTo(goal.x + goal.w/2 + 2, goal.y);
  ctx.closePath();
  ctx.fill();
}

function drawPlayer() {
  const px = player.x;
  const py = player.y;
  const pw = player.w;
  const ph = player.h;

  const squashW = pw * (1 + (1 - player.squash) * 0.5);
  const squashH = ph * player.squash;
  const offsetX = (pw - squashW) / 2;
  const offsetY = ph - squashH;

  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(px + pw/2, py + ph + 3, squashW/2, 5, 0, 0, Math.PI*2);
  ctx.fill();

  const bodyGrad = ctx.createLinearGradient(px + offsetX, py + offsetY, px + offsetX, py + offsetY + squashH);
  bodyGrad.addColorStop(0, '#ff6b6b');
  bodyGrad.addColorStop(1, '#ee5a24');
  ctx.fillStyle = bodyGrad;
  roundRect(px + offsetX, py + offsetY, squashW, squashH, 6);

  const eyeY = py + offsetY + squashH * 0.35;
  const blinking = player.eyeBlink > 2900 && player.eyeBlink < 3000;
  const eyeH = blinking ? 1 : 5;
  ctx.fillStyle = 'white';
  ctx.fillRect(px + offsetX + squashW * 0.22, eyeY, 7, eyeH);
  ctx.fillRect(px + offsetX + squashW * 0.58, eyeY, 7, eyeH);
  if (!blinking) {
    const lookDir = player.vx > 0 ? 2 : player.vx < 0 ? -1 : 0;
    ctx.fillStyle = '#222';
    ctx.fillRect(px + offsetX + squashW * 0.28 + lookDir, eyeY + 1, 4, 3);
    ctx.fillRect(px + offsetX + squashW * 0.64 + lookDir, eyeY + 1, 4, 3);
  }
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  ctx.fill();
}

function drawHUD() {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, W, 45);

  ctx.fillStyle = themes[currentStage].platform;
  ctx.font = 'bold 16px "Segoe UI"';
  ctx.textAlign = 'left';
  ctx.fillText(`STAGE ${currentStage + 1}/5 - ${themes[currentStage].name}`, 15, 28);

  ctx.fillStyle = '#feca57';
  ctx.font = 'bold 24px "Courier New"';
  ctx.textAlign = 'center';
  ctx.fillText(formatTime(timer), W/2, 30);

  ctx.fillStyle = '#ff6b6b';
  ctx.font = 'bold 16px "Segoe UI"';
  ctx.textAlign = 'right';
  ctx.fillText(`사망: ${deaths}회`, W - 15, 28);

  const progress = (currentStage) / stages.length;
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.fillRect(0, 42, W, 3);
  ctx.fillStyle = themes[currentStage].accent;
  ctx.fillRect(0, 42, W * progress, 3);
}

// ===== GAME LOOP =====
function gameLoop(timestamp) {
  const dt = lastTime ? Math.min(timestamp - lastTime, 33) : 16;
  lastTime = timestamp;

  update(dt);
  draw();
  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
</script>
</body>
</html>
